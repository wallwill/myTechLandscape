<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNCF Landscape — Technology Lifecycle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay" class="login-overlay hidden">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-icon">&#9670;</div>
      <div>
        <div class="login-title">CNCF Technology Lifecycle</div>
        <div class="login-subtitle">Enterprise Portfolio Management</div>
      </div>
    </div>
    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" autocomplete="username" required placeholder="Enter username">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required placeholder="Enter password">
      </div>
      <div id="login-error" class="form-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
  </div>
</div>

<!-- Main app -->
<div id="main-app" class="hidden">
  <header>
    <div class="header-top">
      <div class="header-left">
        <h1>CNCF Landscape <span>Technology Lifecycle</span></h1>
      </div>
      <div class="header-right">
        <div class="team-selector-wrap">
          <label for="team-selector">Team / BU</label>
          <select id="team-selector"></select>
        </div>
        <button id="btn-export-csv" class="btn btn-outline" title="Download assignments as CSV">&#8595; CSV</button>
        <button id="btn-export-pdf" class="btn btn-outline" title="Print or save as PDF">&#9113; Print</button>
        <div class="user-menu" id="user-menu">
          <button class="user-btn" id="user-btn" aria-haspopup="true">
            <span class="user-avatar" id="user-avatar">A</span>
            <span id="user-display-name">Admin</span>
            <span class="chevron">&#8964;</span>
          </button>
          <div class="user-dropdown hidden" id="user-dropdown" role="menu">
            <button id="btn-change-password">Change Password</button>
            <button id="btn-admin-panel" class="hidden">Admin Panel</button>
            <hr>
            <button id="btn-logout">Sign Out</button>
          </div>
        </div>
      </div>
    </div>
    <div class="header-bottom">
      <div class="controls">
        <input type="text" id="search" placeholder="Search projects, categories..." autocomplete="off">
        <select id="filter-category"><option value="">All Categories</option></select>
        <select id="filter-stage">
          <option value="">All Stages</option>
          <option value="unassigned">Unassigned</option>
          <option value="Invest">Invest</option>
          <option value="Maintain">Maintain</option>
          <option value="Tolerate">Tolerate</option>
          <option value="Eliminate">Eliminate</option>
        </select>
        <select id="filter-cncf">
          <option value="">All CNCF Status</option>
          <option value="graduated">Graduated</option>
          <option value="incubating">Incubating</option>
          <option value="sandbox">Sandbox</option>
        </select>
      </div>
      <div id="stats" class="stats"></div>
    </div>
  </header>

  <main id="app">
    <div class="loading">Loading CNCF landscape data...</div>
  </main>
</div>

<!-- Assignment Detail Modal -->
<div id="detail-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-title" id="modal-project-name"></div>
        <div class="modal-subtitle" id="modal-project-sub"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="modal-description" class="modal-desc"></div>
      <div class="form-row">
        <div class="form-group">
          <label for="modal-stage">Lifecycle Stage</label>
          <select id="modal-stage" class="stage-select-modal">
            <option value="">— No stage assigned —</option>
            <option value="Invest">Invest</option>
            <option value="Maintain">Maintain</option>
            <option value="Tolerate">Tolerate</option>
            <option value="Eliminate">Eliminate</option>
          </select>
        </div>
        <div class="form-group">
          <label for="modal-owner">Owner / DRI</label>
          <input type="text" id="modal-owner" placeholder="e.g. Platform Team, Jane D.">
        </div>
      </div>
      <div class="form-group">
        <label for="modal-notes">Notes / Rationale</label>
        <textarea id="modal-notes" rows="3" placeholder="Why this stage? Any context for the team..."></textarea>
      </div>
      <div class="modal-audit">
        <div class="audit-title">Change History</div>
        <div id="modal-audit-log" class="audit-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-danger" id="modal-remove" style="display:none">Remove Assignment</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<!-- Admin Panel Modal -->
<div id="admin-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-title">Admin Panel</div>
        <div class="modal-subtitle">Manage teams, business units, and user accounts</div>
      </div>
      <button class="modal-close" id="admin-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="teams">Teams / Business Units</button>
        <button class="admin-tab" data-tab="users">Users</button>
      </div>

      <div id="tab-teams" class="tab-content">
        <div class="tab-actions">
          <input type="text" id="new-team-name" placeholder="New team or business unit name...">
          <button class="btn btn-primary" id="btn-add-team">Add Team</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="teams-table">
            <thead><tr><th>Team / Business Unit</th><th>Created</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div id="tab-users" class="tab-content hidden">
        <div class="tab-actions">
          <input type="text" id="new-user-username" placeholder="Username">
          <input type="password" id="new-user-password" placeholder="Password (min 6 chars)">
          <select id="new-user-team"><option value="">No team</option></select>
          <select id="new-user-role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <button class="btn btn-primary" id="btn-add-user">Add User</button>
        </div>
        <div class="table-wrap">
          <table class="admin-table" id="users-table">
            <thead><tr><th>Username</th><th>Role</th><th>Team</th><th>Created</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div id="password-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-title">Change Password</div>
      </div>
      <button class="modal-close" id="password-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="pw-current">Current Password</label>
        <input type="password" id="pw-current" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label for="pw-new">New Password</label>
        <input type="password" id="pw-new" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="pw-confirm">Confirm New Password</label>
        <input type="password" id="pw-confirm" autocomplete="new-password">
      </div>
      <div id="pw-error" class="form-error hidden"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="pw-cancel">Cancel</button>
      <button class="btn btn-primary" id="pw-save">Update Password</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
